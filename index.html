<!doctype html>

<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bugsweeper</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header>
      <div class="logo">
        <span>Bugsweeper</span>
      </div>
      <p class="tagline">Commit. Avoid issues. Merge.</p>
    </header>

    <main>
      <div class="controls">
        <div class="difficulty-selector">
          <button class="diff-btn active" data-difficulty="beginner">
            Beginner
          </button>
          <button class="diff-btn" data-difficulty="intermediate">
            Intermediate
          </button>
          <button class="diff-btn" data-difficulty="expert">
            Expert
          </button>
        </div>
        <div class="stats">
          <div class="stat-box">
            <svg class="stat-icon issue-icon" viewBox="0 0 16 16" fill="currentColor">
              <path
                d="M8 9.5a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3Z"
              />
              <path
                d="M8 0a8 8 0 1 1 0 16A8 8 0 0 1 8 0ZM1.5 8a6.5 6.5 0 1 0 13 0 6.5 6.5 0 0 0-13 0Z"
              />
            </svg>
            <span id="mine-count">010</span>
          </div>
          <button id="reset-btn" title="New game">
            <svg viewBox="0 0 16 16" width="20" height="20" fill="currentColor">
              <path
                d="M1.705 8.005a.75.75 0 01.834.656 5.5 5.5 0 009.592 2.97l-1.204-1.204a.25.25 0 01.177-.427h3.646a.25.25 0 01.25.25v3.646a.25.25 0 01-.427.177l-1.38-1.38A7.002 7.002 0 011.05 8.84a.75.75 0 01.656-.834zM8 2.5a5.487 5.487 0 00-4.131 1.869l1.204 1.204A.25.25 0 014.896 6H1.25A.25.25 0 011 5.75V2.104a.25.25 0 01.427-.177l1.38 1.38A7.002 7.002 0 0114.95 7.16a.75.75 0 11-1.49.178A5.5 5.5 0 008 2.5z"
              />
            </svg>
          </button>
          <div class="stat-box">
            <svg class="stat-icon timer-icon" viewBox="0 0 16 16" fill="currentColor">
              <path
                d="M8 0a8 8 0 1 1 0 16A8 8 0 0 1 8 0ZM1.5 8a6.5 6.5 0 1 0 13 0 6.5 6.5 0 0 0-13 0Zm7-3.25v2.992l2.028.812a.75.75 0 0 1-.557 1.392l-2.5-1A.751.751 0 0 1 7 8.25v-3.5a.75.75 0 0 1 1.5 0Z"
              />
            </svg>
            <span id="timer">000</span>
          </div>
        </div>
      </div>

      <div class="board-wrapper">
        <div class="contrib-labels">
          <span>010</span>
          <span>001</span>
          <span>111</span>
        </div>
        <div id="board" role="grid"></div>
      </div>

      <div class="legend">
        <span class="legend-label">Less</span>
        <span class="legend-cell" style="background: var(--c0)"></span>
        <span class="legend-cell" style="background: var(--c1)"></span>
        <span class="legend-cell" style="background: var(--c2)"></span>
        <span class="legend-cell" style="background: var(--c3)"></span>
        <span class="legend-cell" style="background: var(--c4)"></span>
        <span class="legend-label">More</span>
      </div>

      <div id="message-overlay" class="message-overlay hidden" role="alert">
        <div class="message-box">
          <svg id="msg-icon" width="32" height="32" viewBox="0 0 16 16"></svg>
          <h2 id="msg-title"></h2>
          <p id="msg-subtitle"></p>
          <button id="msg-btn">Play Again</button>
        </div>
      </div>
    </main>

    <footer>
      <p>Left-click to commit · Right-click to open a PR</p>
    </footer>

    <script src="game.js"></script>
  </body>
</html>
